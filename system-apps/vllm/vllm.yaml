apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vllm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  sources:
    - repoURL: https://vllm-project.github.io/production-stack
      chart: vllm-stack
      targetRevision: 0.1.11
      helm:
        releaseName: vllm
        valueFiles:
          - $values/argo-values/vllm-values.yaml
    - repoURL: https://github.com/Josephmaclean/argocd-root-app
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vllm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
