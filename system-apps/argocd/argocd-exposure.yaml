apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-exposure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Josephmaclean/argocd-example-apps.git
    targetRevision: HEAD
    path: resources/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
