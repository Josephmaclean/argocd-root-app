apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-dashboard
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/headlamp/
      chart: headlamp
      targetRevision: 0.41.0
      helm:
        releaseName: headlamp
    - repoURL: https://github.com/Josephmaclean/argocd-example-apps.git
      targetRevision: HEAD
      path: resources/dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
